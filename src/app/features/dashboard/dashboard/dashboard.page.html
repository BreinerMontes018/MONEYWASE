<ion-header>

  <ion-toolbar>

    <ion-title>Dashboard</ion-title>

    <ion-buttons slot="end">

      <ion-button (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
      </ion-button>

    </ion-buttons>

  </ion-toolbar>

</ion-header>

<ion-content>

  <ion-grid>

    <ion-row>

      <ion-col size="12">

        <app-dashboard-card
          titulo="Saldo actual"
          [monto]="saldo"
          tipo="Neutral"
          icono="wallet">
        </app-dashboard-card>

      </ion-col>

    </ion-row>

    <ion-row>

      <ion-col size="6">

        <app-dashboard-card
          titulo="Ingresos"
          [monto]="ingresos"
          tipo="Ingreso"
          icono="arrow-up">
        </app-dashboard-card>

      </ion-col>

      <ion-col size="6">

        <app-dashboard-card
          titulo="Gastos"
          [monto]="gastos"
          tipo="Gasto"
          icono="arrow-down">
        </app-dashboard-card>

      </ion-col>

    </ion-row>

  </ion-grid>

  <!-- Categorías -->

  <ion-card>

    <ion-card-header>
      <ion-card-title>Gastos por categoría</ion-card-title>
    </ion-card-header>

    <ion-card-content>

      <app-progress-bar-category
        *ngFor="let c of categorias | keyvalue"
        [categoria]="c.key"
        [monto]="c.value"
        [porcentaje]="gastos ? c.value / gastos : 0"
        color="danger">
      </app-progress-bar-category>

    </ion-card-content>

  </ion-card>

</ion-content>
