<ion-header>
  <ion-toolbar>
    <ion-title>Registro</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <form [formGroup]="form">

    <ion-item>

  <ion-label position="floating">
  Nombre
  </ion-label>

  <ion-input
  type="text"
  formControlName="nombre">
  </ion-input>

</ion-item>

    <ion-item>

      <ion-label position="floating">
        Email
      </ion-label>

      <ion-input type="email" formControlName="email">
      </ion-input>

    </ion-item>

    <ion-item>

      <ion-label position="floating">
        Contraseña
      </ion-label>

      <ion-input type="password" formControlName="password">
      </ion-input>

    </ion-item>

    <ion-button expand="block" (click)="register()">

      Registrarse

    </ion-button>

  </form>

</ion-content>
