<ion-header>
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <form [formGroup]="form">

    <ion-item>

      <ion-label position="floating">
        Email
      </ion-label>

      <ion-input type="email" formControlName="email">
      </ion-input>

    </ion-item>


    <ion-item>

      <ion-label position="floating">
        Contraseña
      </ion-label>

      <ion-input type="password" formControlName="password">
      </ion-input>

    </ion-item>


    <ion-button expand="block" color="primary" (click)="login()">

      Ingresar

    </ion-button>


    <ion-button expand="block" fill="clear" routerLink="/auth/register">

      Crear cuenta

    </ion-button>

  </form>

</ion-content>
