<ion-header>
  <ion-toolbar>
    <ion-title>Nueva Transacción</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

<form [formGroup]="form">

<!-- Tipo de transacción -->
<ion-item>
  <ion-label>Tipo</ion-label>
</ion-item>

<ion-segment formControlName="tipo">

  <ion-segment-button
    *ngFor="let t of tipos"
    [value]="t">

    <ion-label>{{t}}</ion-label>

  </ion-segment-button>

</ion-segment>

<!-- Categoría -->
<app-select-field
label="Categoría"
[options]="categoriasNombres"
[value]="form.get('categoria')?.value"
(valueChange)="form.get('categoria')?.setValue($event)">
</app-select-field>


<!-- Monto -->
<app-input-field
label="Monto"
type="number"
[value]="form.get('monto')?.value"
(valueChange)="form.get('monto')?.setValue($event)">
</app-input-field>

<!-- Fecha -->
<app-date-field
label="Fecha"
[value]="form.get('fecha')?.value"
(valueChange)="form.get('fecha')?.setValue($event)">
</app-date-field>

<!-- Descripción -->
<ion-item>
  <ion-label position="floating">Descripción</ion-label>
  <ion-textarea
    formControlName="descripcion">
  </ion-textarea>
</ion-item>

<app-photo-selector
(fotoChange)="foto = $event">
</app-photo-selector>

<!-- Botón guardar -->
<ion-button
  expand="block"
  color="primary"
  (click)="guardar()">

Guardar Transacción

</ion-button>

</form>

</ion-content>
