<ion-header>
  <ion-toolbar>
    <ion-title>Nueva Transacción</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

<form [formGroup]="form">

<!-- Tipo de transacción -->
<ion-item>
  <ion-label>Tipo</ion-label>
</ion-item>

<ion-segment formControlName="tipo">

  <ion-segment-button
    *ngFor="let t of tipos"
    [value]="t">

    <ion-label>{{t}}</ion-label>

  </ion-segment-button>

</ion-segment>

<!-- Categoría -->
<ion-item>
  <ion-label position="floating">Categoría</ion-label>

  <ion-select formControlName="categoria">

  <ion-select-option
    *ngFor="let c of categorias"
    [value]="c.nombre">

    {{ c.nombre }}

  </ion-select-option>

</ion-select>
</ion-item>

<!-- Monto -->
<ion-item>
  <ion-label position="floating">Monto</ion-label>
  <ion-input
    type="number"
    formControlName="monto">
  </ion-input>
</ion-item>

<!-- Fecha -->
<ion-item>
  <ion-label>Fecha</ion-label>
  <ion-datetime
    presentation="date"
    formControlName="fecha">
  </ion-datetime>
</ion-item>

<!-- Descripción -->
<ion-item>
  <ion-label position="floating">Descripción</ion-label>
  <ion-textarea
    formControlName="descripcion">
  </ion-textarea>
</ion-item>

<app-photo-selector
(fotoChange)="foto = $event">
</app-photo-selector>

<!-- Botón guardar -->
<ion-button
  expand="block"
  color="primary"
  (click)="guardar()">

Guardar Transacción

</ion-button>

</form>

</ion-content>
