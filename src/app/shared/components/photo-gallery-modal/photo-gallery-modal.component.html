<ion-header class="photo-header">

  <ion-toolbar>

    <ion-buttons slot="start">

      <ion-button fill="clear" (click)="cerrar()">

        <ion-icon name="chevron-back-outline"></ion-icon>

      </ion-button>

    </ion-buttons>

    <ion-title>
      Comprobante
    </ion-title>

  </ion-toolbar>

</ion-header>


<ion-content class="photo-container">

  <div class="photo-wrapper">

    <img
      *ngFor="let foto of fotos"
      [src]="foto">

  </div>

</ion-content>
